# Example compose for docker-static-web. See the README for all configuration options and hardening.
services:
  static-web:
    image: ghcr.io/cplieger/docker-static-web:latest
    container_name: static-web
    restart: unless-stopped

    ports:
      - "8567:8567"

    # No in-container healthcheck (scratch has no shell); probe off-host instead. See README.

    volumes:
      - "./www:/www:ro"  # document root (read-only)

    # darkhttpd logs one line per request to stdout; cap the json-file driver.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
