services:
  static-web:
    image: ghcr.io/cplieger/docker-static-web:latest
    container_name: static-web
    restart: unless-stopped

    ports:
      - "8567:8567"

    # Serve a read-only document root. The image runs darkhttpd from /www
    # (see Dockerfile CMD) on a `scratch` base — no shell, tiny footprint.
    volumes:
      - ./www:/www:ro

    # Log rotation is a runtime setting (no Dockerfile equivalent). darkhttpd
    # logs one CLF line per request to stdout; cap the json-file driver so
    # request volume can't grow unbounded and fill the host disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
