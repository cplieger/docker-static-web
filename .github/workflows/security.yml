name: Security

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    uses: cplieger/ci/.github/workflows/security-scan.yaml@a4a5c8d560e69958c08f1294f699a9c41d187a23 # v1
    with:
      scan-type: "both"
