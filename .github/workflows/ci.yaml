name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/shell-ci.yaml@ebe4928b0bfda0fe33858e21bc05a6c9ecc8a59c # v1
    with:
      # No shell scripts in this repo; /dev/null keeps shellcheck a no-op
      # while hadolint still lints the Dockerfile.
      shellcheck-paths: "/dev/null"
