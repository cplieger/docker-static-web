name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/shell-ci.yaml@98c2f685fa19abbbc43735b1108bfd53d30e65e0 # v1
    with:
      # No shell scripts in this repo; /dev/null keeps shellcheck a no-op
      # while hadolint still lints the Dockerfile.
      shellcheck-paths: "/dev/null"
