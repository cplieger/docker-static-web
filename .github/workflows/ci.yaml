name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/shell-ci.yaml@a4a5c8d560e69958c08f1294f699a9c41d187a23 # v1
    with:
      # No shell scripts in this repo; /dev/null keeps shellcheck a no-op
      # while hadolint still lints the Dockerfile.
      shellcheck-paths: "/dev/null"
