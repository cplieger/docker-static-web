name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "*.sh"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  release:
    uses: cplieger/ci/.github/workflows/docker-release.yaml@98c2f685fa19abbbc43735b1108bfd53d30e65e0 # v1
    with:
      registries: "ghcr"
    secrets: inherit
